name: Build Windows Release

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - chore/claude-audit-p0-guardrails

jobs:
  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: apps/desktop

    steps:
      - uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/desktop/package-lock.json

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri

      - name: Install frontend deps
        run: npm ci

      - name: Build Windows release
        run: npm run tauri build -- --bundles nsis,msi
        env:
          # Assina o artefato de updater (.nsis.zip). Chave Ed25519 do updater (sem senha).
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
          VITE_AX_APP_KEY: ${{ secrets.VITE_AX_APP_KEY }}

      - name: Upload NSIS installer
        uses: actions/upload-artifact@v4
        with:
          name: AX-Control-Windows-Setup
          path: apps/desktop/src-tauri/target/release/bundle/nsis/*.exe
          retention-days: 30

      - name: Upload MSI installer
        uses: actions/upload-artifact@v4
        with:
          name: AX-Control-Windows-MSI
          path: apps/desktop/src-tauri/target/release/bundle/msi/*.msi
          retention-days: 30

      - name: Upload updater artifact (NSIS .zip + .sig)
        uses: actions/upload-artifact@v4
        with:
          name: AX-Control-Windows-Updater
          path: |
            apps/desktop/src-tauri/target/release/bundle/nsis/*.nsis.zip
            apps/desktop/src-tauri/target/release/bundle/nsis/*.nsis.zip.sig
          retention-days: 30
