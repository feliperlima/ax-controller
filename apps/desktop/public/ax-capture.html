<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AX Capture - AXIOS32 WebSocket Monitor</title>
  <style>
    body { font-family: monospace; margin: 0; display: flex; }
    #frame-container { flex: 1; }
    iframe { width: 100%; height: 100vh; border: none; }
    #panel {
      position: fixed;
      bottom: 20px;
      right: 20px;
      width: 400px;
      max-height: 300px;
      background: rgba(0, 0, 0, 0.9);
      color: #0f0;
      border: 2px solid #0f0;
      border-radius: 4px;
      padding: 10px;
      font-size: 11px;
      z-index: 10000;
      overflow-y: auto;
      box-shadow: 0 0 10px rgba(0, 255, 0, 0.3);
    }
    #panel button {
      background: #0f0;
      color: #000;
      border: none;
      padding: 5px 10px;
      margin: 2px;
      cursor: pointer;
      font-weight: bold;
      border-radius: 2px;
    }
    #panel button:hover { background: #0f0; opacity: 0.8; }
    #status { margin-top: 5px; font-size: 10px; }
    .log-entry { margin: 2px 0; padding: 2px; border-bottom: 1px solid #0f0; }
    .tx { color: #0ff; }
    .rx { color: #f0f; }
  </style>
</head>
<body>

<div id="frame-container">
  <iframe id="mesa-frame" src="about:blank"></iframe>
</div>

<div id="panel">
  <div>
    <button onclick="AX_CAPTURE.toggle()">Toggle Capture</button>
    <button onclick="AX_CAPTURE.clear()">Clear</button>
    <button onclick="AX_CAPTURE.export()">Export</button>
  </div>
  <div id="status">Status: initializing...</div>
  <div id="log-display"></div>
</div>

<script>
  window.AX_CAPTURE = {
    enabled: true,
    logs: [],
    txCount: 0,
    rxCount: 0,
    lastTx: null,
    lastRx: null,

    log: function(type, socketId, byteLength, raw) {
      const entry = {
        timestamp: Date.now(),
        type,
        socketId,
        byteLength,
        hex: raw.toString('hex').substring(0, 64),
        raw: Array.from(new Uint8Array(raw)).slice(0, 32),
      };
      this.logs.push(entry);
      if (this.logs.length > 100) this.logs.shift();
      if (type === 'TX') {
        this.txCount += 1;
        this.lastTx = entry;
      } else {
        this.rxCount += 1;
        this.lastRx = entry;
      }
      this.updateStatus();
    },

    updateStatus: function() {
      const status = document.getElementById('status');
      status.innerHTML = `TX: ${this.txCount} | RX: ${this.rxCount} | Logs: ${this.logs.length}`;
    },

    toggle: function() {
      this.enabled = !this.enabled;
      const status = document.getElementById('status');
      status.innerHTML += `<br>Capture: ${this.enabled ? 'ON' : 'OFF'}`;
    },

    clear: function() {
      this.logs = [];
      this.txCount = 0;
      this.rxCount = 0;
      document.getElementById('log-display').innerHTML = '';
      this.updateStatus();
    },

    export: function() {
      const json = JSON.stringify({
        txCount: this.txCount,
        rxCount: this.rxCount,
        logs: this.logs,
      }, null, 2);
      console.log(json);
      const blob = new Blob([json], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `ax-capture-${Date.now()}.json`;
      a.click();
      alert('Exported to file');
    },

    summary: function() {
      const unique = new Set(this.logs.map((log) => log.hex));
      console.log(`Total logs: ${this.logs.length}`);
      console.log(`Unique TX/RX: ${unique.size}`);
      console.log(`Last TX:`, this.lastTx);
      console.log(`Last RX:`, this.lastRx);
    },
  };

  const mesaFrame = document.getElementById('mesa-frame');
  const logDisplay = document.getElementById('log-display');

  mesaFrame.onload = function() {
    const frameWindow = mesaFrame.contentWindow;
    try {
      if (frameWindow.Module && frameWindow.Module.websocket) {
        const orig = frameWindow.Module.websocket;
        frameWindow.Module.websocket = function(...args) {
          return orig(...args);
        };
      }
    } catch (e) {
      console.log('Could not hook Module.websocket:', e.message);
    }

    const checkHooks = setInterval(() => {
      try {
        if (frameWindow.Runtime && frameWindow.Runtime.dynCall) {
          clearInterval(checkHooks);
          console.log('Hooks ready');
        }
      } catch (e) {}
    }, 100);

    setTimeout(() => clearInterval(checkHooks), 5000);
  };

  mesaFrame.src = 'http://192.168.1.75/';
  window.AX_CAPTURE.updateStatus();
</script>

</body>
</html>
